name: Build and Deploy Docs

on:
  push:
    paths:
      - 'vitepress_doc/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22.13.0'

    - name: Build VitePress docs
      run: |
        cd vitepress_doc
        npm install
        npm run build

    - name: Upload docs to server
      env:
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      run: |
        echo Uploading docs files to server...
        sshpass -p "${SERVER_PASSWORD}" ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "mkdir -p /root/saolei/docs"
        sshpass -p "${SERVER_PASSWORD}" scp -o StrictHostKeyChecking=no -r vitepress_doc/.vitepress/dist/* ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/root/saolei/docs/

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5

    - name: Build VitePress docs for GitHub Pages
      env:
        VITEPRESS_BASE: /${{ github.event.repository.name }}/
        VITEPRESS_MAIN_SITE_URL: https://openms.top/
      run: |
        cd vitepress_doc
        npm run build

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: vitepress_doc/.vitepress/dist

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
