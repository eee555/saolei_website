name: Cypress E2E Tests

on:
  pull_request:
    paths: 
      - 'front_end/**'
      - 'back_end/**'
      - '.github/workflows/CypressE2E.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_DATABASE: saolei
          MYSQL_ROOT_PASSWORD: 123456
        options: --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 3306:3306
      redis:  # 添加 Redis 服务
        image: redis:latest
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          cd back_end/saolei
          pip install -r requirements.txt
          pip install cryptography
          pip install coverage pytest-cov
          
      - name: Create Logs Directory
        run: mkdir -p back_end/saolei/logs

      - name: Set up backend
        run: |
          cd back_end/saolei
          python manage.py makemigrations
          python manage.py migrate
          E2E_TEST=True python manage.py runserver > backend.log 2>&1 &
          echo "Backend started in background"

      - name: Install frontend dependencies
        run: |
          cd front_end
          npm install

      - name: Install Chinese fonts
        run: sudo apt-get install -y fonts-wqy-zenhei fonts-noto-cjk

      - name: Run Cypress
        uses: cypress-io/github-action@v7
        with:
          start: npm run dev
          working-directory: front_end
          wait-on: 'http://localhost:8000'

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: front_end/cypress/screenshots
          if-no-files-found: ignore
          
      - name: Upload backend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: back_end/saolei/logs
          if-no-files-found: ignore
