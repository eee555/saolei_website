[flake8]
# A003: A class attribute is shadowing a Python builtin. (flake8-builtins)
# DJ08: Model does not define __str__ method. (flake8-django)
# E501: Line to long. (flake8)
# W503: Line break occurred before a binary operator. (flake8)
# W504: Line break occurred after a binary operator. (flake8)
ignore = E501, A003, DJ08, W504, W503
exclude =
    */migrations/*,
    ./.venv/*
application-import-names = accountlink, common, config, identifier, msuser, tournament, userprofile, utils, videomanager
import-order-style = google
